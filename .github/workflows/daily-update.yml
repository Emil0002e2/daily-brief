name: Daily Brief Update

on:
  schedule:
    - cron: '0 6 * * *'  # 6:00 UTC = 8:00 CEST (Österreich Sommerzeit)
  workflow_dispatch: # Manuell auslösbar

jobs:
  update-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Update Daily Brief
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python scripts/update_brief.py

      - name: Commit and push
        run: |
          git config user.name "Daily Brief Bot"
          git config user.email "bot@daily-brief.app"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily brief update $(date +%Y-%m-%d)"
            git push
          fi
